<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mode Fokus - Masjid Al-Ikhlas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            height: 100vh;
            margin: 0;
            overflow: hidden;
            /* Flexbox untuk memusatkan konten di seluruh halaman */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Islamic Geometric Pattern */
        .pattern-bg {
            position: fixed;
            inset: 0;
            opacity: 0.04;
            background-image:
                repeating-linear-gradient(45deg, transparent, transparent 35px, rgba(251, 191, 36, 0.1) 35px, rgba(251, 191, 36, 0.1) 70px),
                repeating-linear-gradient(-45deg, transparent, transparent 35px, rgba(251, 191, 36, 0.1) 35px, rgba(251, 191, 36, 0.1) 70px);
            pointer-events: none;
            z-index: 1;
        }

        .ambient-glow {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 50% 0%, rgba(251, 191, 36, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(30, 27, 75, 0.5) 0%, transparent 50%);
            pointer-events: none;
            z-index: 2;
        }

        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Main Card */
        .focus-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(251, 191, 36, 0.2);
            border-radius: 40px;
            padding: 5rem 6rem;
            text-align: center;
            box-shadow:
                0 32px 64px -12px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.1),
                0 0 120px rgba(251, 191, 36, 0.08);
            position: relative;
            max-width: 1100px;
            width: 90%;
            animation: enter 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes enter {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .frame-corner {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 2px solid rgba(251, 191, 36, 0.3);
        }

        .frame-tl {
            top: 30px;
            left: 30px;
            border-right: 0;
            border-bottom: 0;
            border-radius: 20px 0 0 0;
        }

        .frame-tr {
            top: 30px;
            right: 30px;
            border-left: 0;
            border-bottom: 0;
            border-radius: 0 20px 0 0;
        }

        .frame-bl {
            bottom: 30px;
            left: 30px;
            border-right: 0;
            border-top: 0;
            border-radius: 0 0 0 20px;
        }

        .frame-br {
            bottom: 30px;
            right: 30px;
            border-left: 0;
            border-top: 0;
            border-radius: 0 0 20px 0;
        }

        /* Clock Badge - TENGAH ATAS */
        .clock-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(251, 191, 36, 0.3);
            padding: 1rem 2rem;
            /* DIUBAH: dari 1rem 2.5rem menjadi 1rem 2rem */
            border-radius: 100px;
            margin-bottom: 2rem;
            /* DIUBAH: dari 3rem menjadi 2rem */
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .clock-icon {
            color: #fbbf24;
            font-size: 1.25rem;
        }

        .clock-text {
            color: #fbbf24;
            font-size: 1.5rem;
            font-weight: 600;
            font-family: 'Inter', monospace;
            letter-spacing: 0.05em;
        }

        /* Typography */
        .label-text {
            font-family: 'Inter', sans-serif;
            color: #94a3b8;
            font-size: 1.25rem;
            font-weight: 400;
            margin-bottom: 1rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-align: center;
        }

        .prayer-title {
            font-family: 'Amiri', serif;
            color: #fbbf24;
            font-size: 3rem;
            font-weight: 700;
            line-height: 1.1;
            text-shadow: 0 4px 40px rgba(251, 191, 36, 0.25);
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .prayer-name {
            font-family: 'Amiri', serif;
            color: #fde68a;
            font-size: 7rem;
            font-weight: 400;
            margin-bottom: 2rem;
            text-align: center;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 1.2rem;
            font-weight: 300;
            font-style: italic;
            letter-spacing: 0.02em;
            text-align: center;
        }

        /* Loading Screen */
        #loading-screen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .loading-content {
            text-align: center;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(251, 191, 36, 0.1);
            border-top-color: #fbbf24;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        .loading-text {
            color: #fbbf24;
            font-size: 1.2rem;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.1em;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Countdown Timer - DIHILANGKAN */
        .countdown-container {
            display: none;
        }

        /* Animations */
        @keyframes breathe {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.3;
            }

            50% {
                transform: scale(1.1);
                opacity: 0.5;
            }
        }

        /* Glow Effect */
        .soft-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(251, 191, 36, 0.12) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            animation: breathe 6s ease-in-out infinite;
        }

        /* Masjid Silhouette */
        .masjid-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 120px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.6) 0%, transparent 100%);
            pointer-events: none;
            z-index: 5;
        }

        /* Fade In Animation */
        .fade-in {
            animation: fadeIn 1.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .prayer-title {
                font-size: 2rem;
            }

            .prayer-name {
                font-size: 4rem;
            }

            .focus-card {
                padding: 3rem 2rem;
            }

            .clock-badge {
                padding: 0.75rem 1.5rem;
            }

            .clock-text {
                font-size: 1.25rem;
            }
        }
    </style>
</head>

<body>
    <!-- Backgrounds -->
    <div class="pattern-bg"></div>
    <div class="ambient-glow"></div>

    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div class="loading-text">MEMUAT FOKUS MODE...</div>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Main Card -->
        <div class="focus-card">
            <!-- Frame Corners -->
            <div class="frame-corner frame-tl"></div>
            <div class="frame-corner frame-tr"></div>
            <div class="frame-corner frame-bl"></div>
            <div class="frame-corner frame-br"></div>

            <!-- Glow Effect -->
            <div class="soft-glow"></div>

            <!-- Clock Badge -->
            <div class="clock-badge">
                <i class="fas fa-clock clock-icon"></i>
                <span class="clock-text" id="clock">00:00:00</span>
            </div>

            <!-- Content -->
            <div class="label-text">Sedang Berlangsung</div>
            <div class="prayer-title">SHALAT</div>
            <div class="prayer-name" id="prayer-name">ISYA</div>
            <div class="subtitle">"Harap menonaktifkan suara handphone Anda"</div>
        </div>

        <!-- Countdown Timer - DIHILANGKAN -->
    </div>

    <!-- Masjid Footer -->
    <div class="masjid-footer">
        <div class="silhouette"></div>
    </div>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script>
        // ==================== FUNGSI UNTUK MENGAMBIL DURASI FOKUS DARI DATABASE ====================
        async function getFokusDurationFromServer(prayerName) {
            try {
                console.log(`🔍 Mengambil durasi fokus untuk: ${prayerName} dari database...`);

                // Mapping nama shalat ke format yang benar di database admin.js
                const prayerMapping = {
                    'subuh': 'subuh',
                    'shubuh': 'subuh',
                    'dzuhur': 'dzuhur',
                    'ashar': 'ashar',
                    'maghrib': 'maghrib',
                    'isya': 'isya',
                    'jumat': 'jumat',
                    'tarawih': 'tarawih'
                };

                const mappedPrayer = prayerMapping[prayerName] || prayerName;

                // Panggil API settings
                const response = await fetch('/api/settings');
                if (!response.ok) {
                    throw new Error('Gagal mengambil settings');
                }

                const result = await response.json();

                if (result.success && result.data) {
                    // Cari setting dengan key yang sesuai
                    const settingKey = `fokus_duration_${mappedPrayer}`;
                    const targetSetting = result.data.find(s => s.setting_key === settingKey);

                    if (targetSetting && targetSetting.setting_value) {
                        const duration = parseInt(targetSetting.setting_value);
                        console.log(`✅ Durasi fokus dari database: ${duration} menit untuk ${prayerName} (key: ${settingKey})`);
                        return duration;
                    } else {
                        console.log(`⚠️ Tidak ada setting untuk ${settingKey}, mencari key alternatif...`);

                        // Coba cari dengan key alternatif
                        const altKey = `fokus_${mappedPrayer}`;
                        const altSetting = result.data.find(s => s.setting_key === altKey);

                        if (altSetting && altSetting.setting_value) {
                            const duration = parseInt(altSetting.setting_value);
                            console.log(`✅ Durasi fokus dari database (key alternatif): ${duration} menit`);
                            return duration;
                        }
                    }
                }
            } catch (error) {
                console.error('❌ Error mengambil durasi fokus dari server:', error);
            }

            // Jika gagal, gunakan default berdasarkan jenis shalat
            const defaultDurations = {
                'subuh': 10,
                'shubuh': 10,
                'dzuhur': 10,
                'ashar': 10,
                'maghrib': 10,
                'isya': 10,
                'jumat': 30,
                'tarawih': 45
            };

            const defaultDuration = defaultDurations[prayerName] || 10;
            console.log(`⚠️ Menggunakan default duration: ${defaultDuration} menit untuk ${prayerName}`);
            return defaultDuration;
        }

        // ==================== FUNGSI UNTUK MENGAMBIL NAMA SHALAT ====================
        function getPrayerName() {
            // PRIORITAS 1: Dari URL parameter
            const urlParams = new URLSearchParams(window.location.search);
            const prayerFromUrl = urlParams.get('prayer');

            if (prayerFromUrl) {
                console.log(`📌 Nama shalat dari URL: ${prayerFromUrl}`);
                return prayerFromUrl.toLowerCase();
            }

            // PRIORITAS 2: Dari localStorage (adzan_prayer_name)
            const prayerFromStorage = localStorage.getItem('adzan_prayer_name');
            if (prayerFromStorage) {
                console.log(`📌 Nama shalat dari localStorage (adzan_prayer_name): ${prayerFromStorage}`);
                return prayerFromStorage.toLowerCase();
            }

            // PRIORITAS 3: Dari localStorage (currentPrayer)
            const currentPrayer = localStorage.getItem('currentPrayer');
            if (currentPrayer) {
                console.log(`📌 Nama shalat dari localStorage (currentPrayer): ${currentPrayer}`);
                return currentPrayer.toLowerCase();
            }

            // FALLBACK
            console.log('⚠️ Tidak ada data shalat, menggunakan default: dzuhur');
            return 'dzuhur';
        }

        // ==================== FUNGSI UNTUK MENGECEK RAMADHAN ====================
        async function checkRamadhanMode() {
            try {
                const response = await fetch('/api/ramadhan-mode');
                const data = await response.json();
                return data.isRamadhan || false;
            } catch (error) {
                console.error('Error cek Ramadhan mode:', error);

                // Fallback: cek dari localStorage
                const hijriDate = localStorage.getItem('hijri_date_cache') || '';
                return hijriDate.toLowerCase().includes('ramadhan');
            }
        }

        // ==================== FUNGSI UPDATE UI ====================
        function updateUIPrayerName(prayerName) {
            const nameEl = document.getElementById('prayer-name');

            const names = {
                'subuh': 'SUBUH',
                'shubuh': 'SUBUH',
                'dzuhur': 'DZUHUR',
                'ashar': 'ASHAR',
                'maghrib': 'MAGHRIB',
                'isya': 'ISYA',
                'jumat': 'JUMAT',
                'tarawih': 'TARAWIH'
            };

            const displayName = names[prayerName] || prayerName.toUpperCase();
            nameEl.textContent = displayName;

            console.log(`🎯 Menampilkan: ${displayName}`);
        }

        // ==================== FUNGSI JAM ====================
        function startClock() {
            const clockEl = document.getElementById('clock');

            const clockInterval = setInterval(() => {
                // Jam Digital Realtime
                const now = new Date();
                clockEl.textContent = now.toLocaleTimeString('id-ID', {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false
                });
            }, 1000);

            return clockInterval;
        }

        // ==================== FUNGSI REDIRECT ====================
        function redirectToNext(currentPrayer, isRamadhan) {
            // Bersihkan flag aktif
            localStorage.removeItem('fokusActive');
            localStorage.removeItem('fokusPrayer');
            localStorage.removeItem('fokusStart');
            localStorage.removeItem('fokusDuration');

            // CEK JIKA RAMADHAN: ISYA -> TARAWIH
            if (currentPrayer === 'isya' && isRamadhan) {
                console.log("🌙 Ramadhan: Transisi dari Isya ke Tarawih...");
                window.location.href = `fokus-mode.html?prayer=tarawih`;
            } else {
                console.log("⏳ Waktu habis, kembali ke Display Utama...");
                window.location.href = 'index.html';
            }
        }

        // ==================== INISIALISASI UTAMA ====================
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // 1. Ambil nama shalat
                const prayerName = getPrayerName();

                // 2. Update UI dengan nama shalat
                updateUIPrayerName(prayerName);

                // 3. Ambil durasi fokus dari server
                let durationMinutes = await getFokusDurationFromServer(prayerName);

                // 4. Simpan ke localStorage untuk referensi
                localStorage.setItem('fokus_duration', durationMinutes.toString());
                localStorage.setItem('fokusPrayer', prayerName);
                localStorage.setItem('fokusActive', 'true');
                localStorage.setItem('fokusStart', Date.now().toString());

                console.log(`✅ Mode Fokus: ${prayerName} selama ${durationMinutes} menit`);

                // 5. Hilangkan loading screen
                setTimeout(() => {
                    document.getElementById('loading-screen').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loading-screen').style.display = 'none';
                    }, 500);
                }, 1000);

                // 6. Start clock
                const clockInterval = startClock();

                // 7. Cek Ramadhan mode untuk redirect
                const isRamadhan = await checkRamadhanMode();

                // 8. Set timer untuk redirect
                const durationInMs = durationMinutes * 60 * 1000;
                const redirectTimer = setTimeout(() => {
                    clearInterval(clockInterval);
                    redirectToNext(prayerName, isRamadhan);
                }, durationInMs);

                // 9. Shortcut Keluar (Esc)
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') {
                        clearTimeout(redirectTimer);
                        clearInterval(clockInterval);
                        if (confirm("Keluar dari Mode Fokus?")) {
                            window.location.href = 'index.html';
                        }
                    }
                });

                // 10. Cleanup saat halaman ditutup
                window.addEventListener('beforeunload', () => {
                    clearTimeout(redirectTimer);
                    clearInterval(clockInterval);
                });

            } catch (error) {
                console.error('❌ Error inisialisasi:', error);

                // Fallback jika error
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('prayer-name').textContent = 'DZUHUR';

                // Mulai clock dengan default
                const clockInterval = startClock();

                setTimeout(() => {
                    clearInterval(clockInterval);
                    window.location.href = 'index.html';
                }, 10 * 60 * 1000);
            }
        });
    </script>
</body>

</html>
