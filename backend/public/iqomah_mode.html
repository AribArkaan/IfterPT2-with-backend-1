<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iqomah - Masjid Al-Ikhlas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #faf3e8 0%, #f5e6d3 100%);
            color: #2c3e50;
            overflow: hidden;
        }

        .arabic-font {
            font-family: 'Amiri', serif;
        }

        /* Pattern islami dengan warna cokelat terang */
        .islamic-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M40 8 L72 40 L40 72 L8 40 L40 8' stroke='%23c9a87c' stroke-width='1.2' fill='none' opacity='0.25'/%3E%3Ccircle cx='40' cy='40' r='4' fill='%23c9a87c' opacity='0.15' /%3E%3C/svg%3E");
            background-size: 80px 80px;
        }

        /* Decorative border dengan warna lebih soft */
        .border-islamic {
            border: 2px solid #e5d5c0;
            position: relative;
            border-radius: 50px;
        }

        /* Soft shadow dengan warna cokelat */
        .soft-shadow {
            box-shadow: 0 15px 35px -10px rgba(170, 130, 90, 0.25);
        }

        /* Countdown style dengan warna cokelat hangat */
        .countdown-number {
            font-family: 'Amiri', serif;
            font-size: 12rem;
            line-height: 1;
            color: #8b6b4f;
            text-shadow: 3px 3px 6px rgba(200, 160, 120, 0.15);
        }

        @media (min-width: 768px) {
            .countdown-number {
                font-size: 16rem;
            }
        }

        /* Running text */
        @keyframes marquee {
            0% {
                transform: translateX(100%);
            }

            100% {
                transform: translateX(-100%);
            }
        }

        .animate-marquee {
            animation: marquee 30s linear infinite;
        }

        .marquee-container {
            mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
        }

        /* Clock style dengan warna cokelat terang */
        .clock {
            background: rgba(255, 245, 235, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid #ecd9c5;
            border-radius: 50px;
            padding: 8px 20px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 6px 20px -8px rgba(150, 110, 70, 0.2);
        }

        .clock-icon {
            color: #c9a87c;
            font-size: 1.2rem;
        }

        .clock-time {
            font-family: 'Amiri', serif;
            font-size: 1.3rem;
            font-weight: 500;
            color: #7a5c42;
            letter-spacing: 1px;
        }

        .clock-date {
            font-size: 0.9rem;
            color: #9f8164;
            border-left: 1px solid #e5d0bc;
            padding-left: 12px;
            margin-left: 8px;
            font-weight: 400;
        }

        /* Card style dengan warna background cerah */
        .card-islamic {
            background: rgba(255, 250, 240, 0.7);
            backdrop-filter: blur(5px);
            border: 1px solid #f0e1d2;
            border-radius: 30px;
        }

        /* Warna teks untuk informasi tambahan */
        .text-brown-soft {
            color: #a5866a;
        }

        .text-brown-medium {
            color: #8b6f54;
        }

        .text-brown-dark {
            color: #6b4f3a;
        }
    </style>
</head>

<body class="islamic-pattern">

    <!-- Decorative Corner Elements -->
    <div class="fixed top-10 left-10 text-6xl opacity-10 rotate-180">☪</div>
    <div class="fixed bottom-10 right-10 text-6xl opacity-10">☪</div>

    <!-- Main Container -->
    <div class="relative z-10 h-screen w-screen flex flex-col items-center justify-center px-4">

        <!-- Main Content Card -->
        <div
            class="w-full max-w-5xl mx-auto bg-white/60 backdrop-blur-sm rounded-3xl soft-shadow p-8 md:p-12 border border-white/70">

            <!-- Header Section -->
            <div class="text-center mb-10">

                <!-- Title -->
                <div class="flex items-center justify-center gap-4 mb-3">
                    <div class="w-12 h-px bg-gradient-to-r from-transparent via-[#b68b6a] to-transparent"></div>
                    <span class="text-sm uppercase tracking-[0.3em] text-[#8b7356] font-light">Iqomah</span>
                    <div class="w-12 h-px bg-gradient-to-r from-transparent via-[#b68b6a] to-transparent"></div>
                </div>

                <!-- Prayer Name -->
                <h1 id="prayer-name" class="arabic-font text-5xl md:text-7xl font-bold text-[#6b4f3a] mb-2">
                    SHALAT
                </h1>

                <!-- Subtitle -->
                <p class="text-[#8b7356] text-lg font-light">
                    Bersiaplah menegakkan shalat
                </p>
            </div>

            <!-- Timer Container -->
            <div class="relative max-w-3xl mx-auto">
                <!-- Decorative Border -->
                <div class="border-islamic rounded-[3rem] p-1">
                    <!-- Inner Content -->
                    <div class="bg-gradient-to-br from-white to-[#fdf8f2] rounded-[3rem] p-10 md:p-16 soft-shadow">

                        <div class="absolute top-4 left-1/2 transform -translate-x-1/2 ">
                            <div class="clock">
                                <span class="clock-icon"></span>
                                <span id="live-clock" class="clock-time">--:--:--</span>
                                <span id="live-date" class="clock-date">Loading...</span>
                            </div>
                        </div>

                        <!-- Countdown -->
                        <div class="text-center">
                            <div id="countdown" class="countdown-number">
                                00:00
                            </div>

                            <!-- Label -->
                            <div class="flex items-center justify-center gap-4 mt-2">
                                <div class="w-16 h-px bg-gradient-to-r from-transparent via-[#b68b6a] to-transparent">
                                </div>
                                <span class="text-sm uppercase tracking-widest text-[#8b7356] font-light">Menuju
                                    Shalat</span>
                                <div class="w-16 h-px bg-gradient-to-r from-transparent via-[#b68b6a] to-transparent">
                                </div>
                            </div>
                        </div>

                        <!-- Status Badge -->
                        <div class="absolute top-4 right-4 md:top-6 md:right-6">
                            <div class="bg-[#e8d9cc] px-4 py-2 rounded-full border border-[#d4b48c]">
                                <div class="flex items-center gap-2">
                                    <div class="w-2 h-2 bg-[#b68b6a] rounded-full"></div>
                                    <span class="text-sm font-medium text-[#6b4f3a]">IQOMAH</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Running Text - Dynamic dari Admin -->
        <div class="fixed bottom-8 left-0 right-0 px-4">
            <div class="max-w-5xl mx-auto">
                <div
                    class="bg-white/20 rounded-2xl py-3 px-6 shadow-[inset_0_1px_4px_rgba(255,255,255,0.8),0_4px_15px_-5px_rgba(0,0,0,0.1)] border border-white/30">
                    <div class="marquee-container overflow-hidden">
                        <div id="running-text" class="animate-marquee whitespace-nowrap text-base text-[#6b4f3a]">
                            <!-- Running text akan diisi secara dinamis dari API -->
                            <span class="mx-6">🕌 Memuat informasi...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== FUNGSI UPDATE WAKTU REAL-TIME ====================
        function updateLiveTime() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const seconds = now.getSeconds().toString().padStart(2, '0');
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const dateStr = now.toLocaleDateString('id-ID', options);
            const clockEl = document.getElementById('live-clock');
            const dateEl = document.getElementById('live-date');
            if (clockEl) clockEl.textContent = `${hours}:${minutes}:${seconds}`;
            if (dateEl) dateEl.textContent = dateStr;
        }
        updateLiveTime();
        setInterval(updateLiveTime, 1000);

        // ==================== DATA DARI LOCALSTORAGE ====================
        const prayerName = localStorage.getItem('adzan_prayer_name') || 'SHALAT';
        const iqomahDuration = parseInt(localStorage.getItem('iqomah_duration')) || 10;
        document.getElementById('prayer-name').textContent = prayerName;

        const adzanTimestamp = parseInt(localStorage.getItem('adzan_timestamp')) || Date.now();
        const iqomahEndTime = adzanTimestamp + (iqomahDuration * 60 * 1000);
        const timerEl = document.getElementById('countdown');

        // Setup audio untuk beep
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        function playBeep() {
            try {
                if (!audioCtx) audioCtx = new AudioContext();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = 600;
                gain.gain.value = 0.2;
                osc.start();
                setTimeout(() => osc.stop(), 200);
            } catch (e) {
                console.log('Audio error:', e);
            }
        }

        let lastBeepSecond = -1; // Melacak detik terakhir beep

        // ==================== FUNGSI UPDATE COUNTDOWN ====================
        function updateCountdown() {
            const now = Date.now();
            const distance = iqomahEndTime - now;
            const urlParams = new URLSearchParams(window.location.search);
            const currentPrayer = urlParams.get('prayer') ||
                localStorage.getItem('adzan_prayer_name') ||
                localStorage.getItem('currentPrayer') ||
                'dzuhur';

            if (distance <= 0) {
                clearInterval(interval);
                // Bunyi panjang sebagai penanda selesai
                if (audioCtx) {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.frequency.value = 440;
                    gain.gain.value = 0.3;
                    osc.start();
                    setTimeout(() => osc.stop(), 1000);
                }
                // Bersihkan localStorage
                localStorage.removeItem('adzan_prayer_name');
                localStorage.removeItem('adzan_timestamp');
                localStorage.removeItem('iqomah_duration');
                localStorage.removeItem('iqomah_redirect_minutes');
                // Redirect ke halaman utama
                setTimeout(() => {
                    window.location.href = `/Fokus-Mode.html?prayer=${currentPrayer}`;
                }, 2000);
                timerEl.textContent = " ";
                return;
            }

            const minutes = Math.floor(distance / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            timerEl.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

            // Efek subtle pada menit terakhir
            if (minutes === 0) {
                timerEl.style.opacity = seconds % 2 === 0 ? '1' : '0.7';
            } else {
                timerEl.style.opacity = '1';
            }

            // Bunyi beep di 10 detik terakhir, setiap detik sekali
            if (minutes === 0 && seconds <= 10) {
                if (seconds !== lastBeepSecond) {
                    playBeep();
                    lastBeepSecond = seconds;
                }
            } else {
                // Reset jika keluar dari rentang 10 detik
                lastBeepSecond = -1;
            }
        }

        // Mulai countdown
        updateCountdown();
        const interval = setInterval(updateCountdown, 100);

        // ==================== LOAD RUNNING TEXT DARI API ====================
        async function loadRunningText() {
            try {
                // GUNAKAN API KHUSUS IQOMAH, BUKAN RUNNING TEXT UMUM
                const response = await fetch('/api/iqomah-running-text');
                if (!response.ok) throw new Error('Failed to load');
                const result = await response.json();

                const marquee = document.getElementById('running-text');

                if (result.success && result.data && result.data.length > 0) {
                    let html = '';

                    // Filter hanya yang aktif
                    const activeTexts = result.data.filter(t => t.is_active);

                    if (activeTexts.length > 0) {
                        // Sort by display_order
                        activeTexts.sort((a, b) => (a.display_order || 0) - (b.display_order || 0));

                        // Duplicate beberapa kali untuk efek marquee yang seamless
                        const texts = [...activeTexts, ...activeTexts, ...activeTexts, ...activeTexts];

                        texts.forEach(text => {
                            html += `<span class="mx-8">${text.text}</span>`;
                        });

                        marquee.innerHTML = html;

                        // Update kecepatan animasi jika ada setting
                        if (activeTexts[0]?.speed) {
                            marquee.style.animationDuration = `${activeTexts[0].speed}s`;
                        }
                    } else {
                        // Fallback jika tidak ada running text aktif
                        marquee.innerHTML = '<span class="mx-6">🕌 Selamat datang di Masjid Al-Ikhlas</span>';
                    }
                } else {
                    // Fallback jika API gagal atau data kosong
                    marquee.innerHTML = `
                <span class="mx-6">🔊 Mohon tenang, matikan HP atau mode silent</span>
                <span class="mx-6">⭐ Rapatkan dan luruskan shaf</span>
                <span class="mx-6">📿 Semoga ibadah kita diterima Allah SWT</span>
            `;
                }
            } catch (error) {
                console.log('Error loading iqomah running text:', error);
                // Fallback ke default jika API gagal
                const marquee = document.getElementById('running-text');
                marquee.innerHTML = `
            <span class="mx-6">🔊 Mohon tenang, matikan HP atau mode silent</span>
            <span class="mx-6">⭐ Rapatkan dan luruskan shaf</span>
            <span class="mx-6">📿 Semoga ibadah kita diterima Allah SWT</span>
        `;
            }
        }

        // Load running text saat halaman dimuat
        loadRunningText();

        // Refresh running text setiap 30 detik untuk update real-time
        setInterval(loadRunningText, 30000);

        // Keyboard shortcut untuk kembali (Esc)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') window.location.href = '/';
        });

        // Cleanup
        window.addEventListener('beforeunload', () => {
            clearInterval(interval);
            if (audioCtx) audioCtx.close();
        });
    </script>
</body>

</html>
