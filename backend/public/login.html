<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Masjid Al-Ikhlas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-card {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }
        .input-group {
            transition: all 0.3s ease;
        }
        .input-group:focus-within {
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="login-card w-full max-w-md rounded-2xl shadow-2xl p-8">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-gradient-to-r from-blue-600 to-purple-600 rounded-2xl mx-auto mb-4 flex items-center justify-center">
                <span class="text-4xl text-white">🕌</span>
            </div>
            <h1 class="text-3xl font-bold text-gray-800">Masjid Al-Ikhlas</h1>
            <p class="text-gray-600 mt-2">Sistem Informasi Masjid Digital</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="space-y-6">
            <div class="input-group">
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    <i class="fas fa-user mr-2"></i>Username or Email
                </label>
                <input type="text" id="username" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
                    placeholder="Masukkan username atau email">
            </div>

            <div class="input-group">
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    <i class="fas fa-lock mr-2"></i>Password
                </label>
                <div class="relative">
                    <input type="password" id="password" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
                        placeholder="Masukkan password">
                    <button type="button" onclick="togglePassword()" class="absolute right-3 top-3 text-gray-500 hover:text-gray-700">
                        <i id="toggleIcon" class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="flex items-center justify-between">
                <label class="flex items-center">
                    <input type="checkbox" class="rounded border-gray-300 text-blue-600 shadow-sm focus:border-blue-300 focus:ring focus:ring-blue-200 focus:ring-opacity-50">
                    <span class="ml-2 text-sm text-gray-600">Ingat saya</span>
                </label>
                <a href="#" class="text-sm text-blue-600 hover:text-blue-800 hover:underline">Lupa password?</a>
            </div>

            <button type="submit"
                class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white py-3 rounded-lg font-semibold hover:from-blue-700 hover:to-purple-700 transform hover:-translate-y-0.5 transition-all duration-200 shadow-lg">
                <i class="fas fa-sign-in-alt mr-2"></i>Login
            </button>
        </form>

        <!-- Register Link -->
        <div class="mt-6 text-center">
            <p class="text-gray-600">
                Belum punya akun? 
                <a href="/register" class="text-blue-600 hover:text-blue-800 font-semibold hover:underline">
                    Daftar sekarang
                </a>
            </p>
        </div>

        <!-- Demo Credentials -->
        <div class="mt-8 p-4 bg-gray-50 rounded-lg border border-gray-200">
            <p class="text-sm text-gray-600 mb-2">
                <i class="fas fa-info-circle text-blue-500 mr-1"></i>
                Demo Akun:
            </p>
            <div class="grid grid-cols-2 gap-2 text-xs">
                <div>
                    <span class="font-semibold">Admin:</span><br>
                    user: admin<br>
                    pass: admin123
                </div>
                <div>
                    <span class="font-semibold">User:</span><br>
                    user: user<br>
                    pass: user123
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-4 right-4 px-6 py-3 rounded-lg shadow-lg text-white hidden transition-all duration-300 z-50"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    <script>
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.remove('hidden');
            
            if (type === 'success') {
                toast.classList.add('bg-green-500');
                toast.classList.remove('bg-red-500', 'bg-yellow-500', 'bg-blue-500');
            } else if (type === 'error') {
                toast.classList.add('bg-red-500');
                toast.classList.remove('bg-green-500', 'bg-yellow-500', 'bg-blue-500');
            } else if (type === 'warning') {
                toast.classList.add('bg-yellow-500');
                toast.classList.remove('bg-green-500', 'bg-red-500', 'bg-blue-500');
            } else {
                toast.classList.add('bg-blue-500');
                toast.classList.remove('bg-green-500', 'bg-red-500', 'bg-yellow-500');
            }
            
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 3000);
        }

        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Validasi sederhana
            if (!username || !password) {
                showToast('Username dan password harus diisi', 'warning');
                return;
            }
            
            try {
                showToast('⏳ Sedang login...', 'info');
                
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const result = await response.json();
                
                if (response.ok && result.success) {
                    showToast('✅ Login berhasil! Mengalihkan...', 'success');
                    
                    // Redirect ke halaman admin setelah 1 detik
                    setTimeout(() => {
                        window.location.href = '/admin';
                    }, 1000);
                } else {
                    showToast(result.error || '❌ Login gagal', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('❌ Koneksi error. Coba lagi.', 'error');
            }
        });

        // Cek apakah sudah login
        async function checkAuth() {
            try {
                const response = await fetch('/api/current-user');
                if (response.ok) {
                    const result = await response.json();
                    if (result.success) {
                        // Jika sudah login, redirect ke admin
                        window.location.href = '/admin';
                    }
                }
            } catch (error) {
                console.error('Error checking auth:', error);
            }
        }
        
        checkAuth();
    </script>
</body>
</html>
